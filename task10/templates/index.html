<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Medical Center - Info Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background-color: white;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .chat-header {
            background-color: #1a73e8;
            color: white;
            padding: 16px 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 18px;
        }

        .chat-header p {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.85;
        }

        .chat-box {
            height: 380px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot-message {
            background-color: #e8f0fe;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background-color: #1a73e8;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus {
            border-color: #1a73e8;
        }

        .chat-input button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input button:hover {
            background-color: #1558b0;
        }

        .suggestions {
            padding: 0 12px 12px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .suggestion-btn {
            background-color: #e8f0fe;
            color: #1a73e8;
            border: 1px solid #1a73e8;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 12px;
        }

        .suggestion-btn:hover {
            background-color: #1a73e8;
            color: white;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>🏥 City Medical Center</h2>
        <p>Information Bot - Ask me anything!</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">Hello! I'm the City Medical Center bot. You can ask me about appointments, doctors, departments, timings, or emergencies.</div>
    </div>

    <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Book an appointment')">Book Appointment</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Show all departments')">Departments</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Doctors in cardiology')">Cardiology Doctors</button>
        <button class="suggestion-btn" onclick="sendSuggestion('What are the timings')">Timings</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Emergency')">Emergency</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function sendMessage() {
        var input = document.getElementById("userInput");
        var message = input.value.trim();

        if (message == "") return;

        appendMessage(message, "user-message");
        input.value = "";

        fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.json())
        .then(data => {
            appendMessage(data.response, "bot-message");
        });
    }

    function appendMessage(text, className) {
        var chatBox = document.getElementById("chatBox");
        var msg = document.createElement("div");
        msg.className = "message " + className;
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(event) {
        if (event.key == "Enter") {
            sendMessage();
        }
    }

    function sendSuggestion(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
    }
</script>

</body>
</html>
