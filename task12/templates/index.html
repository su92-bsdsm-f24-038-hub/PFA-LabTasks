<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Center QnA Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #eaf4fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background-color: white;
            width: 480px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .chat-header {
            background-color: #0077b6;
            color: white;
            padding: 18px 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 18px;
        }

        .chat-header p {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.85;
        }

        .chat-box {
            height: 380px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #f8fbff;
        }

        .message {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bot-message {
            background-color: #dff0fb;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background-color: #0077b6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing {
            font-size: 13px;
            color: #888;
            align-self: flex-start;
            padding: 6px 12px;
        }

        .suggestions {
            padding: 10px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-top: 1px solid #e0e0e0;
            background-color: white;
        }

        .suggestion-btn {
            background-color: #dff0fb;
            color: #0077b6;
            border: 1px solid #0077b6;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 12px;
        }

        .suggestion-btn:hover {
            background-color: #0077b6;
            color: white;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
            background-color: white;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus {
            border-color: #0077b6;
        }

        .chat-input button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-input button:hover {
            background-color: #005f8e;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>🏥 City Medical Center</h2>
        <p>AI-Powered QnA Bot (MiniLM + FAISS)</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot-message">Hello! I'm the City Medical Center AI Bot. Ask me anything about appointments, doctors, departments, or services!</div>
    </div>

    <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('How to book appointment')">Book Appointment</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Hospital timings')">Timings</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Heart doctor')">Heart Doctor</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Emergency')">Emergency</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Hospital location')">Location</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="handleKey(event)" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function sendMessage() {
        var input = document.getElementById("userInput");
        var message = input.value.trim();

        if (message == "") return;

        appendMessage(message, "user-message");
        input.value = "";

        // show typing indicator
        var typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typing";
        typing.innerText = "Bot is typing...";
        document.getElementById("chatBox").appendChild(typing);
        scrollDown();

        fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        })
        .then(res => res.json())
        .then(data => {
            // remove typing indicator
            var t = document.getElementById("typing");
            if (t) t.remove();
            appendMessage(data.response, "bot-message");
        });
    }

    function appendMessage(text, className) {
        var chatBox = document.getElementById("chatBox");
        var msg = document.createElement("div");
        msg.className = "message " + className;
        msg.innerText = text;
        chatBox.appendChild(msg);
        scrollDown();
    }

    function scrollDown() {
        var chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(event) {
        if (event.key == "Enter") {
            sendMessage();
        }
    }

    function sendSuggestion(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
    }
</script>

</body>
</html>
