<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AI Business Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-page">
    <div class="gradient-orb orb-one"></div>
    <div class="gradient-orb orb-two"></div>

    <main class="auth-wrapper">
        <section class="glass-card auth-card">
            <h1>Welcome Back</h1>
            <p class="muted">Log in to your business support AI dashboard.</p>

            <form id="loginForm" class="auth-form">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="Enter username" required />

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password" required />

                <button type="submit" class="btn-neon">Login</button>
            </form>

            <p class="auth-switch">
                No account yet?
                <a href="{{ url_for('signup') }}">Create one</a>
            </p>
            <p id="authMessage" class="form-message"></p>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById('loginForm');
        const authMessage = document.getElementById('authMessage');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            authMessage.textContent = '';

            const payload = {
                username: loginForm.username.value,
                password: loginForm.password.value,
            };

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            const result = await response.json();
            if (result.success) {
                window.location.href = result.redirect;
            } else {
                authMessage.textContent = result.message || 'Login failed.';
            }
        });
    </script>
</body>
</html>
