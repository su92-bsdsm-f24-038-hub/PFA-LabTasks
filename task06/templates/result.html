<!DOCTYPE html>
<html>
<head>
    <title>Detection Results</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .stats {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .stats h2 {
            margin: 0;
            color: #667eea;
            font-size: 36px;
        }
        
        .stats p {
            margin: 10px 0 0 0;
            color: #666;
        }
        
        .images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .image-box {
            text-align: center;
        }
        
        .image-box h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        .image-box img {
            max-width: 100%;
            border-radius: 5px;
            border: 2px solid #ddd;
        }
        
        #map {
            height: 400px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }
        
        .back-btn:hover {
            background: #5568d3;
        }
        
        .alert-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Detection Results</h1>
        
        <div class="stats">
            <h2>{{ count }}</h2>
            <p>Animal(s) Detected</p>
        </div>
        
        {% if count > 0 %}
        <div class="alert-box">
            Alert: Animal herd detected at {{ location }}! Check the map below for exact location.
        </div>
        {% endif %}
        
        <div class="images">
            <div class="image-box">
                <h3>Original Image</h3>
                <img src="{{ url_for('static', filename=original.replace('static/', '')) }}" alt="Original">
            </div>
            <div class="image-box">
                <h3>Detected Animals</h3>
                <img src="{{ url_for('static', filename=result.replace('static/', '')) }}" alt="Result">
            </div>
        </div>
        
        <h3>Location on Map</h3>
        <div id="map"></div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">Upload Another File</a>
        </div>
    </div>
    
    <script>
        var lat = {{ lat }};
        var lon = {{ lon }};
        var count = {{ count }};
        
        var map = L.map('map').setView([lat, lon], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: 'OpenStreetMap'
        }).addTo(map);
        
        var markerColor = count > 0 ? 'red' : 'blue';
        
        var marker = L.marker([lat, lon]).addTo(map);
        
        if (count > 0) {
            marker.bindPopup('<b>Animal Herd Alert!</b><br>{{ count }} animal(s) detected<br>Location: {{ location }}').openPopup();
            
            var circle = L.circle([lat, lon], {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.3,
                radius: 500
            }).addTo(map);
        } else {
            marker.bindPopup('<b>No animals detected</b><br>Location: {{ location }}').openPopup();
        }
    </script>
</body>
</html>
